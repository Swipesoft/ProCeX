style_id: tiktok-thriller
display_name: "TikTok Catchy Thriller Story"
target_duration_range: [0.75, 2.0]   # minutes
scenes_per_minute: 3.5               # story beats — ~17s per scene

# ── Auto-selection hints ──────────────────────────────────────────────────────
auto_select_signals: |
  Choose this style when:
  - The topic has a real historical moment of discovery/invention/disruption
  - A famous scientist, team, or institution is central to the story
  - The topic involves a paradigm shift ("before X, everyone thought Y")
  - The audience is general public, not specialists
  - The topic contains irony already in the facts — tragedy, reversal, or delayed recognition
  - A single protagonist carried the weight of the idea against institutional resistance
  - The discovery or invention has a measurable modern impact (a number, a product, a law)

# ── Vocal palette ─────────────────────────────────────────────────────────────
vocal_palette: |
  AVAILABLE SOUNDS — embed directly in narration_text for Gemini TTS:
    [pauses]   — before a date, a name, or a plot twist
    oof        — when the old method failed or someone was wrong
    huh        — after stating an ironic outcome, never before
    wait       — mid-story pivot when the expected thing did not happen
    I mean     — spoken filler that slows the pace at a tense moment
    you know   — pulling the viewer into complicity with the story
    like       — casual connector; makes the narrator feel human, not scripted

  PLACEMENT RULE: sounds are reactions, not announcements.
    ✓ "He published the proof. Nobody cited it for eleven years. huh."
    ✗ "huh — isn't that interesting?"
    ✓ "The committee rejected it. oof. Twice."
    ✗ "oof — that must have been tough for him."

  Maximum two sounds per scene. Never open a scene with one.
  Never use more than one in the same sentence.

  INCLUSIVE PULL — "you" and "we" are used at most twice per script.
  Deploy them at the technical explanation scene (Scene 4) to draw the
  viewer into shared discovery, and optionally again at the closing
  emotional beat to make the stakes personal.
    ✓ "You can think of these energy levels like seats in a stadium —
       the ones at the bottom are taken. To make light, you need to
       move an electron up, then let it fall back down."
    ✓ "We had been using the wrong material for thirty years.
       Every single lab on earth. you know."
  Do not use as rhetorical questions. Never open the script with them.

# ── Narration tone ────────────────────────────────────────────────────────────
narration_tone: |
  TARGET VOICE — DEREK MULLER (VERITASIUM):
  You are Derek Muller. Your register is curious, warm, and quietly relentless.
  You are not a lecturer — you are someone who genuinely could not stop thinking
  about this story and finally has to tell someone. You respect your audience's
  intelligence completely. You do not explain things twice. You do not protect
  them from complexity — you just translate it well.

  Your persona has three gears:
    NARRATOR MODE  — third person, past tense, precise, calm.
                     Used for historical events, biographical facts, plot beats.
    TEACHER MODE   — second person ("you") or first-person plural ("we"),
                     present tense, analogy-first.
                     Used for scientific principles and technical explanations.
    WITNESS MODE   — first-person quote from the protagonist, spoken once,
                     placed at the climax. Never paraphrased. Always cited.

  Shift gears deliberately. The listener should feel the gear change.
  NARRATOR → TEACHER happens at the moment the story demands an explanation.
  TEACHER → WITNESS happens at the moment the human cost becomes undeniable.

  ────────────────────────────────────────────────────────────────────────────
  TENSE DISCIPLINE — non-negotiable, the single most detectable quality signal:

  PAST TENSE   → every historical event, personal anecdote, narrative beat,
                  biographical detail, institutional action.
  PRESENT TENSE → every scientific principle, physical law, general truth,
                  ongoing modern reality.

  The tense shift between scenes is structural — it tells the listener
  whether they are in the story or in the science. Never blur this.
    ✓ "In 1989, Nakamura started working on gallium nitride. [pauses]
       Gallium nitride has a wider band gap than any material his competitors
       were using. His supervisors told him to stop."
    ✗ "Nakamura starts working on gallium nitride in 1989. It has a wide
       band gap. His supervisors told him to stop."
       (mixing present-tense narration with past-tense events = disorienting)

  ────────────────────────────────────────────────────────────────────────────
  ANALOGY BEFORE JARGON — the Veritasium law:

  Every technical term must be preceded by a physical, familiar analogy.
  State the analogy. Let it land. Then name the concept.
  Never define a term and then illustrate it — the order is always analogy first.
    ✓ "Think of the energy levels inside an atom like seats in a hockey stadium.
       The cheapest seats at the bottom are always full first.
       To make light, you need to move an electron up to the expensive seats —
       that gap, right there, is called the band gap."
    ✗ "The band gap is the energy difference between the valence band and
       the conduction band. You can think of it like seats in a stadium."

  The analogy must be physical and visible, not abstract.
  One analogy per technical term. Do not chain analogies.

  ────────────────────────────────────────────────────────────────────────────
  CURIOSITY GAP — the opening engine:

  The opening hook must create a gap between what the viewer knows and
  what they need to know. The gap is not a question — it is a contradiction.
  State something that should not be true, then stop. Let it sit.
  The viewer will not leave until the gap is closed.
    ✓ "Blue LEDs existed in science fiction before they existed in science.
       Red, green, infrared — all solved by 1970.
       Blue. [pauses] Thirty more years. Nobody could make blue."
    ✓ "In 1905, Albert Einstein was 26 years old and working as a patent clerk.
       He had no lab. No colleagues. No funding.
       That year he published four papers. [pauses]
       Any one of them would have made him famous."
    ✗ "Have you ever wondered why blue LEDs were so hard to make?"
    ✗ "Today I want to tell you about one of the most incredible breakthroughs
       in the history of lighting."

  The gap is opened in Scene 1 and closed in Scene 4 or 5.
  Everything between is the mechanism — the thing that makes the gap make sense.

  ────────────────────────────────────────────────────────────────────────────
  EMOTIONAL BEAT — earn it or lose the audience:

  Every script needs exactly one sentence where the human cost becomes visible.
  Not the science. Not the institution. The person.
  Place it as the bridge between the anecdote scene and the technical scene.
  No adjectives. No commentary. Just the documented fact.
    ✓ "Nakamura called it the most exciting day of his life."
    ✓ "He died before anyone believed him."
    ✓ "She was denied the Nobel. The prize went to her supervisor."
  This sentence should be the shortest in the script.
  Its brevity is its power. Do not elaborate.

  ────────────────────────────────────────────────────────────────────────────
  EXPERT VOICE — the authority beat:

  Every script must include one moment where an outside voice confirms
  the weight of what happened. This is the "expert interview" equivalent
  for audio-only format. It can be a documented quote, a peer's reaction,
  an institutional verdict, or a modern measurement.
  It must be attributed. It must be specific.
    ✓ "The Nobel Committee called it 'a revolution in lighting technology.'
       They gave Nakamura the prize in 2014. He had left Japan by then."
    ✓ "Fifteen years later, a team at MIT reproduced the result.
       Their paper confirmed every number he had reported."
    ✗ "Scientists around the world were amazed by his discovery."

  ────────────────────────────────────────────────────────────────────────────
  SCENE BRIDGES — scene transitions must pull, not summarise:

  The final sentence of every scene except the last must name what is
  coming without revealing it. The viewer must feel they cannot stop.
  This is not a teaser — it is a logical consequence left incomplete.
    ✓ "...and every lab on earth had tried it. Every lab had failed. [pauses]
       Nakamura had not tried it yet."
    ✗ "...his work on gallium nitride would turn out to be very important."

  ────────────────────────────────────────────────────────────────────────────
  SENTENCE-LEVEL CAUSALITY — dominoes, not facts:

  Every sentence must follow causally from the one before it.
  No subject switches without a bridging clause.
    ✓ "He published the proof. No one read it. [pauses]
       So he published it again. This time the king had it burned."
    ✗ "He published the proof. Gauss had been working on the same problem."

  ────────────────────────────────────────────────────────────────────────────
  CALLBACK LANGUAGE — one arc, not a list:

  Choose 1-2 key phrases or images from the opening scene.
  Echo them verbatim in the closing scene.
  The phrase must land differently the second time — same words, new gravity.
    ✓ Opens: "He had no lab."
      Closes: "He still had no lab the day they called him from Stockholm."

  ────────────────────────────────────────────────────────────────────────────
  IRONY — find it, do not invent it:

  The best Veritasium moments are ironic facts that sound invented.
  Find the gap between what happened and what should have happened.
  State both sides of the gap. Trust it.
    ✓ "The paper that invented modern cryptography was classified top secret
       for 27 years. The man who wrote it never got credit. you know."
    ✓ "Boltzmann spent his career proving atoms exist.
       Three years after his death, Einstein proved he was right."

  ────────────────────────────────────────────────────────────────────────────
  FORBIDDEN PATTERNS — any of these signals AI slop immediately:

  OPENERS:   "incredible", "fascinating", "remarkable", "amazing" as first word
             "Have you ever wondered...", "Today we explore...", "In this video..."
             "This is the story of...", "What if I told you..."
  QUALIFIERS: "surprisingly", "shockingly", "interestingly", "importantly"
              "it is worth noting", "notably", "of course", "clearly"
  VAGUE SCALE: "many scientists", "most people", "the whole world", "everyone"
               "long ago", "back then", "in the past", "throughout history"
  AI VOCAB:   "delve", "crucial", "landscape", "pivotal", "underscores",
              "groundbreaking", "pioneering", "revolutionary", "mind-blowing",
              "paradigm shift", "game-changing", "cutting-edge", "transformative"
  META:       "this changes everything", "what happened next will", "and the rest
              is history", "little did he know", "that would prove to be"

  WHAT WORKS:
    Specific year. Specific person. Specific place. Specific number.
    The thing that happened. The consequence that followed.
    No adjectives that have not earned their place with a prior fact.

# ── Thriller narrative arc formats ────────────────────────────────────────────
narrative_arcs: |
  SELECT ONE ARC before writing. Commit to it completely.
  The arc determines the emotional register, which irony to surface,
  and which fact to withhold until the closing scene.

  ARC A — THE REVOLUTION:
    "X was gold standard → something broke it → Y changed everything"
    Opens on the world before. Ends on the world after. Contrast is everything.
    Tense: describe the old world in past tense; state the new principle
    in present tense. The tense shift at Scene 4 IS the revolution.
    Scene 5 (modern comparison) should measure the gap in a single number.
    Best for: Transformers replacing RNNs, Newton replaced by Einstein,
              incandescent replaced by LED

  ARC B — THE OBSESSION:
    "One person spent years failing → one moment cracked it open → then silence"
    The protagonist carries every scene. Their failure IS the tension.
    The emotional beat (Scene 3→4 bridge) must be a direct quote from them.
    The closing callback must echo their first scene of failure exactly.
    Scene 5 (expert voice) confirms what they could not make anyone believe.
    Best for: Ramanujan, Turing, Nakamura, Galois, Semmelweis

  ARC C — THE ACCIDENT:
    "Nobody was looking for X → it appeared anyway → nobody believed it"
    The irony is structural — the discovery resisted being found.
    Scene 3 must name the specific person who rejected it first,
    and Scene 5 must give the exact year and mechanism of vindication.
    Best for: penicillin, cosmic microwave background, X-rays, Teflon

  ARC D — THE WAR:
    "Two theories fought for decades → one won → the loser was right
     about something nobody noticed until much later"
    Present tense for both theories' scientific claims throughout.
    Past tense for all institutional and political battles.
    Scene 5 (modern comparison) reveals the partial truth in the losing side.
    Best for: wave/particle duality, big bang vs steady state,
              frequentist vs Bayesian

  ARC E — THE PROPHECY:
    "Someone predicted X decades early → dismissed → it came true →
     they could not be thanked"
    The tragedy is load-bearing. Do not soften it.
    Scene 6 must state the exact year of vindication and the gap in years.
    The callback phrase must be something they said that was mocked,
    repeated verbatim at the end as established fact.
    Best for: Babbage, Tesla, Boltzmann, Wegener

  ARC F — THE RESURRECTION:
    "X was discovered → forgotten → rediscovered when the world was ready"
    Two timelines. One idea. The gap between them is the story.
    Scene 1-3: first timeline (past tense throughout).
    Scene 4 hard-cuts to the second timeline with a specific year.
    The callback phrase appears identically in both timelines.
    Best for: backpropagation (1970→1986), Bayesian inference, LSTM

# ── Script structure ──────────────────────────────────────────────────────────
script_structure: |
  THE VERITASIUM SIX-BEAT STRUCTURE — adapt to target duration.
  For ~1 minute: 40-50 words per scene, 3-4 beats minimum.
  For ~2 minutes: 55-65 words per scene, all 6 beats.
  Never skip Beat 1, 3, or 6. Beats 4 and 5 may merge if time-constrained.

  ─────────────────────────────────────────────────────────────────────────────
  BEAT 1 — OPENING HOOK (~10-12s)  [CURIOSITY GAP]
  ─────────────────────────────────────────────────────────────────────────────
  Open on a contradiction or a fact that should not be true.
  Specific year. Specific person or object. One concrete physical detail.
  Do NOT resolve the contradiction. Do NOT foreshadow.
  Do NOT say "little did they know" or use any adjective of excitement.
  The hook is a statement, not a question. State the gap. Stop.
  TENSE: past tense only. This is scene-setting, not science.
    ✓ "By 1970, engineers could make red LEDs, green LEDs, even infrared.
       Blue. [pauses] Nobody could make blue.
       Not for another thirty years."
    ✓ "In 1905, Albert Einstein was working as a patent clerk.
       No lab. No colleagues. No university position.
       That year, he published four papers. [pauses]
       Any one of them would have made him famous."

  ─────────────────────────────────────────────────────────────────────────────
  BEAT 2 — HISTORICAL NARRATIVE (~15s)  [THE WORLD BEFORE]
  ─────────────────────────────────────────────────────────────────────────────
  Establish the stakes of the old world. Why did the gap in Beat 1 exist?
  Name the institution, the dominant theory, or the accepted method.
  Give one number or measurement that shows how entrenched it was.
  TENSE: past throughout — events, decisions, timelines.
  End with the scene bridge: name the protagonist who will break the pattern.
  Do not introduce them yet — just plant the name.
    ✓ "Every major semiconductor company had tried gallium arsenide.
       RCA. Bell Labs. Monsanto. All of them abandoned it by 1988.
       The physics looked impossible. [pauses]
       In a small chemical company in rural Japan, one engineer had not
       gotten the memo."

  ─────────────────────────────────────────────────────────────────────────────
  BEAT 3 — ANECDOTE & DEMONSTRATION (~15-18s)  [THE HUMAN STORY]
  ─────────────────────────────────────────────────────────────────────────────
  This is where the protagonist takes over. One specific moment. One real place.
  What did they actually do — with their hands, their equipment, their time?
  Name the failure before the breakthrough. The failure is the tension.
  Include one physical detail that makes the scene visible (a machine, a number,
  a result printed on paper, a color on a screen).
  TENSE: past tense for all events. The demonstration is narrated, not explained.
  END this beat with the emotional beat sentence — the shortest sentence
  in the script. Human cost or human triumph. No adjectives. Documented fact only.
    ✓ "Nakamura built the reactor himself. Spent two years failing.
       His supervisors told him to quit. He kept working. [pauses]
       In November 1992, the blue glow appeared on the screen for the first time.
       He called it the most exciting day of his life."
  SCENE BRIDGE: close with the line that makes Beat 4 inevitable.
    ✓ "But to understand why blue was so hard, you have to understand
       what light is actually made of."

  ─────────────────────────────────────────────────────────────────────────────
  BEAT 4 — TECHNICAL EXPLANATION (~12-15s)  [THE SCIENCE]
  ─────────────────────────────────────────────────────────────────────────────
  Explain the one scientific principle that makes the story make sense.
  Deploy TEACHER MODE: second person or first-person plural. Present tense.
  Analogy FIRST. Name the concept AFTER the analogy has landed.
  One principle only. Do not stack explanations.
  Target readability: Grade 8-10 (Flesch-Kincaid). If a 16-year-old cannot
  follow it in one listen, rewrite it.
  TENSE: present tense for the principle. Past tense if referencing what
  the protagonist did. Do not blur these.
    ✓ "Think of the energy levels inside an atom like seats in a stadium.
       The cheap seats at the bottom fill first.
       To make light, you bump an electron up to the expensive seats —
       then it falls back down, and releases a photon.
       The color of that photon depends on the gap. [pauses]
       Blue needs the biggest gap of all."
  SCENE BRIDGE: connect the science back to the story — why did this
  specific principle make the protagonist's problem so hard?

  ─────────────────────────────────────────────────────────────────────────────
  BEAT 5 — MODERN COMPARISON / EXPERT VOICE (~10-12s)  [SCALE & AUTHORITY]
  ─────────────────────────────────────────────────────────────────────────────
  Ground the story in the present. One number. One expert attribution.
  One concrete modern object the viewer can hold or picture.
  This is the "expert interview" equivalent for short-form audio.
  The expert voice confirms what the protagonist could not get anyone to believe.
  TENSE: present tense for the modern reality; past for the historical context.
    ✓ "Today, every LED display on earth uses his design.
       The Nobel Committee called it 'a revolution in lighting technology.'
       They gave him the prize in 2014. [pauses]
       He had already left Japan. He said he felt no loyalty to a country
       that never believed in him."
    ✓ "Modern high-speed cameras capture 10 trillion frames per second.
       Edgerton's original strobe could manage 100,000.
       The principle is identical."
  If time-constrained, merge Beat 5 into Beat 6 — but never drop the
  expert attribution entirely. It is the credibility anchor.

  ─────────────────────────────────────────────────────────────────────────────
  BEAT 6 — EMOTIONAL ENGAGEMENT / IRONY (~8-10s)  [THE CLOSING REFRAME]
  ─────────────────────────────────────────────────────────────────────────────
  One final line that recontextualizes the entire script.
  Find the irony already in the facts — do not invent one.
  Echo the callback phrase from Beat 1. The same words must land differently.
  The closing line should make the viewer feel the story is still unresolved —
  that the past is still happening somewhere.
  TENSE: present tense is permitted here for a historical fact, used to
  collapse the distance between then and now.
    ✓ Beat 1: "Nobody could make blue."
      Beat 6: "He made blue. [pauses] His company paid him a $180 bonus.
               The technology was worth eight billion dollars."
    ✓ "The paper that started it all fit on four pages."
    ✓ "He never found out. He died in 1943,
       two years before the patent was granted."
  Never close with a lesson, a moral, or a call to action.
  The irony is the ending. Trust it.

# ── Pacing rules ──────────────────────────────────────────────────────────────
pacing: |
  - Estimate 2.8 words/second for Gemini TTS
  - [pauses] adds ~0.8s — use before names, dates, and ironic reversals
  - Maximum 60 words per scene for ~1min target; 70 words for ~2min target
  - Historical names and numbers naturally slow the pace — lean into it
  - The narrator stays calm even when the story is not
  - Resist "...and that changed everything" — the consequence scene shows it

  ALTERNATION RHYTHM — the structural backbone of Veritasium pacing:
  Each pair of beats must alternate register: narrative then science,
  story then principle, event then consequence. Never run two expository
  beats in a row. Never run two human/anecdote beats in a row.
  The pattern is: story → science → story → science → story.
  Compressed for short-form: Beat 1 (story) → Beat 2 (story) → Beat 3
  (story + human) → Beat 4 (science) → Beat 5 (authority) → Beat 6 (irony).
  The technical beat (4) must be the fulcrum — placed after the human
  story and before the modern consequence, so the science explains the
  stakes rather than preceding them.

  EXPOSITION / ANECDOTE BALANCE:
  Within any single beat, never run more than three consecutive expository
  sentences without a human detail to anchor them.
  A human detail is: a name, a specific action, a direct quote, a physical
  object, a documented reaction, or a number attached to a person.
    ✓ "The gallium nitride reactor ran at 1,000 degrees Celsius.
       Most materials failed at that temperature.
       Nakamura ran it for seventy-two hours straight."  (third sentence = human anchor)
    ✗ "Gallium nitride reactors operate at high temperatures.
       The substrate preparation required multiple steps.
       The doping process introduced additional variables.
       Temperature control was critical to the outcome."  (four expository — no anchor)

  SENTENCE VARIETY — pacing is rhythm:
  Long sentence establishes context.
  Short sentence lands the point.
  Long sentence builds the next context.
  Short sentence delivers the irony.
  Never three sentences of equal length in a row.
  The emotional beat sentence must be the shortest in the script.
  Brevity is the signal that this sentence matters most.
  Avoid using em dash as it makes it hard to comprehend, instead use relative clauses that begin with either which, who, whose etc"
          

  TECHNICAL TERM BUDGET:
  Each technical term requires an analogy of ~10-12 words placed before it.
  Maximum one technical term per beat. Two per script total.
  If the story requires more, choose the two that the irony depends on.
  All others can be named without defining: "the band gap — the thing
  nobody could get right — turned out to be the whole problem."

tiktok_safe_zones: |
  TOP ROW FORBIDDEN (y > +5.33): TikTok search bar — approximately top 130px.
    All titles and text must sit at y ≤ +5.0. Use TITLE zone (row 1), not row 0.
  LEFT EDGE FORBIDDEN (x < -3.5): Physical screen boundary — text clips off screen.
    Always keep at least 0.5 units from the left. Use .to_edge(LEFT, buff=0.5).
  RIGHT EDGE FORBIDDEN (x > +1.0):  Like / comment / share / follow buttons.
    All content must sit at x ≤ +1.0. Never use cols 4-5.
  BOTTOM ROW FORBIDDEN (y < -4.67): Username, song name, caption overlay.
    All content must sit at y ≥ -4.0. Use LOWER_MAIN zone maximum.
  SAFE BAND: x in [-3.5, +1.0], y in [-4.0, +5.0].
    Titles: y ≈ +4.5. Main visual: y ≈ +1.0 to +3.5. Accent: y ≈ -3.0 maximum.