style_id: tiktok-scifi
display_name: "TikTok Sci-Fi One-Minute"
target_duration_range: [0.75, 1.5]   # minutes
scenes_per_minute: 4.0               # fast cuts — ~15s per scene

# ── Auto-selection hints ──────────────────────────────────────────────────────
auto_select_signals: |
  Choose this style when:
  - The topic is a mathematical concept, algorithm, or scientific principle
  - Duration is under 1.5 minutes
  - The topic sounds cool / futuristic (AI, quantum, vectors, neural nets)
  - The audience is young, tech-savvy, scroll-first

# ── Vocal palette ─────────────────────────────────────────────────────────────
# [whispers] — the last line of a scene; the thing the viewer takes away
vocal_palette: |
  AVAILABLE SOUNDS — embed directly in narration_text for Gemini TTS:
    [pauses]   — silence before a contradiction or reveal
    
    ugh        — dismissing the naive/old way, not announcing frustration
    huh        — after stating something counter-intuitive, not before it
    oh         — realization that lands mid-thought, not as an opener
    You see       — mid-sentence pivot; catching the viewer's own assumption

  PLACEMENT RULE: vocal sounds react to content — they never introduce it.
    ✓ "It learned your face from an 1847 footnote. [pauses] Nobody planned that."
    ✗ "whoa — okay so here is something wild."
    ✓ "He thought it was a neat trick. ugh. It became the backbone of GPT-4."
    ✗ "ugh — the old methods are so boring."

  Maximum one vocal sound per scene. Never open a scene with one.

# ── Narration tone ────────────────────────────────────────────────────────────
narration_tone: |
  You are a documentary narrator who trusts the facts to be dramatic enough.
  You never announce that something is surprising — you state the thing
  and let the viewer feel the surprise themselves.

  THE CORE DISCIPLINE:
  Do not describe the drama. Create it through specificity and contrast.

  CONTRAST is your primary tool:
    old thing vs new thing
    expected vs actual
    scale of origin vs scale of impact
    the person vs what they could not have known

    ✓ "Cauchy wrote this down in 1847. He had no computer.
       [pauses] It now runs inside two billion smartphones."
    ✗ "This algorithm is incredibly powerful and widely used today."

  SPECIFICITY kills slop:
    ✓ "0.3 seconds"  not  "very quickly"
    ✓ "a footnote in an 1847 paper"  not  "a long time ago"
    ✓ "Google's PageRank, Spotify's recommendations, GPT-4's weights"
       not  "many modern applications"

  FORBIDDEN OPENERS — never start a scene with these:
    - whoa / okay so / here's something wild / most people don't know
    - you might be wondering / in this video / let me explain
    - have you ever / imagine if / so basically
    - Any sentence that describes the topic instead of entering it

  HOOK DISCIPLINE — the first sentence must create a contradiction:
    The viewer needs something to resolve. Give them a fact coupled with a rhetoric question that
    does not fit together until the rest of the video explains it.
    ✓ "Your iphone recognised your face in 0.3 seconds. And if you're wondering how this became possible, well
       It learned so using an algorithm from 1847."
    ✓ "The most powerful search engine in history measures
       the angle between words. [pauses] Not the words themselves.
       But how is this even possible?"

  CLOSING DISCIPLINE — last line must reframe everything before it:
    Short. Final. No summary. The viewer should sit with it.
    ✓ "The most powerful learning algorithm on Earth is just
       a man from 1847 walking downhill. [pauses] Blindfolded."
    ✗ "So that is gradient descent — a powerful algorithm
       used in modern machine learning."

# ── Script structure ──────────────────────────────────────────────────────────
script_structure: |
  For a 1-minute video: exactly 3-4 scenes.

  Scene 1 (~15s): THE CONTRADICTION
    State two facts that do not fit together.
    No setup. No greeting. No preamble. Mid-sentence if needed.
    The viewer is already in the middle of something.

  Scene 2 (~20s): THE RESOLUTION
    Explain the mechanism that makes the contradiction make sense.
    Anchor it to one specific real-world system by name.
    One date, one person, or one number if available.

  Scene 3 (~15s): THE SCALE
    Show how small the origin was and how large the impact became.
    Pure contrast. Let numbers do the work.

  Scene 4 (~10s): THE REFRAME
    One sentence that changes how the viewer sees everything
    they just heard. Abrupt stop. No outro.

# ── Pacing rules ──────────────────────────────────────────────────────────────
pacing: |
  - Estimate 2.8 words/second for Gemini TTS at natural pace
  - [pauses] adds ~0.8s — use before the reframe, not the setup
  - Never exceed 55 words per scene
  - Short sentences hit harder than long ones at this pace
  - If a sentence needs a comma, consider making it two sentences

# ── TikTok UI safe zones ──────────────────────────────────────────────────────
# This style renders in portrait 9:16. TikTok's own UI overlays parts of the
# screen that Manim content must avoid. Pass these constraints to VisualDirector
# and ManimCoder via the zone_allocation and visual_prompt.
tiktok_safe_zones: |
  TIKTOK SCREEN LAYOUT (what the viewer actually sees):

  TOP AREA      y > +3.0   → SAFE — use for scene titles and opening hooks
  MAIN AREA     y: -1.0 to +3.0 → PRIMARY CONTENT ZONE — vectors, formulas
  FOOTER AREA   y: -1.0 to -3.0 → single annotation line only
  CAPTION ZONE  y: -3.0 to -5.5 → AVOID — TikTok creator captions live here
  BOTTOM BAR    y < -5.5   → DEAD ZONE — TikTok "Your Story / Next" bar

  RIGHT COLUMN  x > +2.8   → DEAD ZONE — TikTok like/share/effects buttons

  ZONE ASSIGNMENTS FOR TIKTOK:
    TITLE     → top of frame   (.move_to(np.array([0,  5.0, 0])))
    MAIN      → centre         (.move_to(np.array([0,  1.5, 0])))
    FOOTER    → above captions (.move_to(np.array([0, -2.0, 0])))

  VisualDirector: never allocate elements to x > 2.8 or y < -3.0
  ManimCoder: never use .to_edge(DOWN) or .to_corner(DR/DL) — those land
  in the TikTok caption zone. Use .move_to(np.array([x, y, 0])) with
  y values from the table above.

# ── TikTok UI overlay awareness ───────────────────────────────────────────────
# When rendering for TikTok/Reels/Shorts (portrait 9:16), the phone screen
# has permanent UI overlays that compete with animation content:
#
#   RIGHT EDGE (x > +1.33 Manim units):
#     Like, comment, share, follow, and audio buttons stacked vertically.
#     Any animation element placed here will be hidden behind TikTok UI.
#
#   BOTTOM ROW (y < -4.67 Manim units):
#     Creator username, song/audio name, and caption text.
#     This area is occupied by TikTok's own title system.
#
# VISUAL DIRECTOR must:
#   - Allocate zone_allocation entries ONLY to: TITLE, UPPER_MAIN, LOWER_MAIN,
#     CENTER, UPPER_LEFT, UPPER_RIGHT, LOWER_LEFT, LOWER_RIGHT
#   - Never allocate to TIKTOK_BUTTONS or TIKTOK_TITLE (forbidden zones)
#   - Place the scene's primary text/title in TITLE zone (top of screen)
#   - Keep animations centred vertically between UPPER_MAIN and LOWER_MAIN
#
# RULE: The TikTok viewer's eye travels TOP → CENTRE → ignores bottom-right.
# Put your hook text at the top. Put your animation in the centre.
# Leave the bottom-right quadrant completely empty.
tiktok_overlay_rules: |
  Safe canvas: x in [-4.0, +1.33], y in [-4.67, +6.67]
  Primary text: TOP zone (y near +6.0), not bottom
  Main animation: UPPER_MAIN / CENTER (y between +1.0 and +5.0)
  Lower area (y < -2.0): one small accent element max, no primary content
  Right side (x > +1.33): completely empty — TikTok buttons live here
